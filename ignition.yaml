---
- name: OpenShift Installation and CoreOS ISO Customization
  hosts: localhost
  become: true
  vars:
    files_dir: "{{ playbook_dir }}"

  tasks:
    - name: Remove the install directory if it exists
      ansible.builtin.file:
        path: /root/install_dir/
        state: absent

    - name: Create the install directory
      ansible.builtin.file:
        path: /root/install_dir/
        state: directory
        mode: '0755'

    - name: Copy the install-config.yaml file to the install directory
      ansible.builtin.copy:
        src: /root/install-config.yaml
        dest: /root/install_dir/install-config.yaml

    - name: Run "openshift-install create manifests" command
      ansible.builtin.command:
        cmd: openshift-install create manifests --dir=/root/install_dir/
      args:
        chdir: /root

    - name: Update mastersSchedulable to false in cluster-scheduler-02-config.yml
      ansible.builtin.lineinfile:
        path: /root/install_dir/manifests/cluster-scheduler-02-config.yml
        regexp: '^mastersSchedulable: true'
        line: 'mastersSchedulable: False'

    - name: Run "openshift-install create ignition-configs" command
      ansible.builtin.command:
        cmd: openshift-install create ignition-configs --dir=/root/install_dir/
      args:
        chdir: /root

    - name: Check if Fedora CoreOS live ISO exists
      ansible.builtin.stat:
        path: "{{ files_dir }}/fedora-coreos-43.20260217.3.1-live-iso.x86_64.iso"
      register: coreos_iso

    - name: Download Fedora CoreOS live ISO
      ansible.builtin.get_url:
        url: https://builds.coreos.fedoraproject.org/prod/streams/stable/builds/43.20260217.3.1/x86_64/fedora-coreos-43.20260217.3.1-live-iso.x86_64.iso
        dest: "{{ files_dir }}/fedora-coreos-43.20260217.3.1-live-iso.x86_64.iso"
        mode: '0644'
      when: not coreos_iso.stat.exists

    - name: Remove bootstrap ISO if it exists
      ansible.builtin.file:
        path: "{{ files_dir }}/bootstrap.iso"
        state: absent

    - name: Remove master ISO if it exists
      ansible.builtin.file:
        path: "{{ files_dir }}/master.iso"
        state: absent

    - name: Remove worker ISO if it exists
      ansible.builtin.file:
        path: "{{ files_dir }}/worker.iso"
        state: absent

    - name: Customize CoreOS ISO for bootstrap
      ansible.builtin.command:
        cmd: coreos-installer iso customize --live-karg-append 'rd.udev=1' --live-karg-append 'ignition.platform.id=qemu' --live-karg-append 'fsck.mode=skip' --dest-device /dev/vda --dest-ignition /root/install_dir/bootstrap.ign -o bootstrap.iso {{ files_dir }}/fedora-coreos-43.20260217.3.1-live-iso.x86_64.iso 
      args:
        chdir: "{{ files_dir }}/"

    - name: Customize CoreOS ISO for master
      ansible.builtin.command:
        cmd: coreos-installer iso customize --live-karg-append 'rd.udev=1' --live-karg-append 'ignition.platform.id=qemu' --live-karg-append 'fsck.mode=skip' --dest-device /dev/vda --dest-ignition /root/install_dir/master.ign -o master.iso {{ files_dir }}/fedora-coreos-43.20260217.3.1-live-iso.x86_64.iso 
      args:
        chdir: "{{ files_dir }}/"

    - name: Customize CoreOS ISO for worker
      ansible.builtin.command:
        cmd: coreos-installer iso customize --live-karg-append 'rd.udev=1' --live-karg-append 'ignition.platform.id=qemu' --live-karg-append 'fsck.mode=skip' --dest-device /dev/vda --dest-ignition /root/install_dir/worker.ign -o worker.iso {{ files_dir }}/fedora-coreos-43.20260217.3.1-live-iso.x86_64.iso 
      args:
        chdir: "{{ files_dir }}/"

    - name: Copy bootstrap ISO to remote server
      ansible.builtin.command:
        cmd: scp -o StrictHostKeyChecking=no bootstrap.iso root@192.168.1.7:/var/lib/vz/template/iso/bootstrap.iso
      args:
        chdir: "{{ files_dir }}/"

    - name: Copy master ISO to remote server
      ansible.builtin.command:
        cmd: scp -o StrictHostKeyChecking=no master.iso root@192.168.1.7:/var/lib/vz/template/iso/master.iso
      args:
        chdir: "{{ files_dir }}/"

    - name: Copy worker ISO to remote server
      ansible.builtin.command:
        cmd: scp -o StrictHostKeyChecking=no worker.iso root@192.168.1.7:/var/lib/vz/template/iso/worker.iso
      args:
        chdir: "{{ files_dir }}/"
