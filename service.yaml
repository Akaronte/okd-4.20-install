---
- name: Configurar DNS (named) y balanceador de carga (haproxy)
  hosts: localhost
  become: yes
  vars:
    files_dir: "{{ playbook_dir }}/kube3"

  tasks:

    - name: Actualizar caché de apt
      apt:
        update_cache: yes

    - name: Instalar bind9, haproxy y git
      apt:
        name:
          - bind9
          - bind9utils
          - bind9-doc
          - haproxy
          - git
        state: present

    - name: Instalar software-properties-common
      apt:
        name: software-properties-common
        state: present

    - name: Agregar repositorio PPA de Ansible
      apt_repository:
        repo: ppa:ansible/ansible
        state: present
        update_cache: yes

    - name: Instalar Ansible
      apt:
        name: ansible
        state: present

    - name: Copiar named.conf.options
      copy:
        src: "{{ files_dir }}/named.conf.options"
        dest: /etc/bind/named.conf.options
        owner: root
        group: bind
        mode: '0640'

    - name: Copiar named.conf.default-zones
      copy:
        src: "{{ files_dir }}/named.conf.default-zones"
        dest: /etc/bind/named.conf.default-zones
        owner: root
        group: bind
        mode: '0640'

    - name: Crear directorio /var/named/
      file:
        path: /var/named
        state: directory
        owner: bind
        group: bind
        mode: '0750'

    - name: Copiar zona directa al directorio named
      copy:
        src: "{{ files_dir }}/kube3.okd.piensoluegoinstalo.com.zone"
        dest: /var/named/kube3.okd.piensoluegoinstalo.com.zone
        owner: bind
        group: bind
        mode: '0640'

    - name: Copiar zona inversa al directorio named
      copy:
        src: "{{ files_dir }}/103.168.192.IN-ADDR.ARPA.zone"
        dest: /var/named/103.168.192.IN-ADDR.ARPA.zone
        owner: bind
        group: bind
        mode: '0640'

    - name: Iniciar servicio named
      systemd:
        name: named
        state: started

    - name: Verificar estado de named
      command: systemctl status named
      register: named_status
      changed_when: false

    - name: Mostrar estado de named
      debug:
        var: named_status.stdout_lines

    - name: Habilitar named al inicio del sistema
      systemd:
        name: named
        enabled: yes

    - name: Copiar configuración de haproxy
      copy:
        src: "{{ files_dir }}/haproxy.cfg"
        dest: /etc/haproxy/haproxy.cfg
        owner: root
        group: root
        mode: '0644'

    - name: Permitir conexiones arbitrarias en haproxy (SELinux)
      command: setsebool -P haproxy_connect_any 1
      when: ansible_selinux.status is defined and ansible_selinux.status == "enabled"

    - name: Iniciar servicio haproxy
      systemd:
        name: haproxy
        state: started

    - name: Verificar estado de haproxy
      command: systemctl status haproxy
      register: haproxy_status
      changed_when: false

    - name: Mostrar estado de haproxy
      debug:
        var: haproxy_status.stdout_lines

    - name: Habilitar haproxy al inicio del sistema
      systemd:
        name: haproxy
        enabled: yes
